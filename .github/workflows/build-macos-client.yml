name: build-macos-client

on:
  workflow_dispatch:
    inputs:
      features:
        description: Cargo features to enable (for example real-lldb)
        required: false
        default: ""
  push:
    branches:
      - master
      - main
    paths:
      - Cargo.toml
      - src/**
      - scripts/build_macos_client.sh
      - .github/workflows/build-macos-client.yml

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and package app
        shell: bash
        run: |
          chmod +x scripts/build_macos_client.sh
          FEATURES="${{ github.event.inputs.features }}"
          if [[ -n "${FEATURES}" ]]; then
            scripts/build_macos_client.sh --target "${{ matrix.target }}" --features "${FEATURES}"
          else
            scripts/build_macos_client.sh --target "${{ matrix.target }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-client-${{ matrix.target }}
          path: dist/macos/*.zip
